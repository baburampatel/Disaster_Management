{% extends "base.html" %}
{% block title %}Register - DisasterGuard{% endblock %}
{% block content %}
<div class="auth-card" style="margin-top: 4rem;">
    <div class="card">
        <h2 class="text-center mb-3">Create Account</h2>
        <form method="post">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" name="email" placeholder="agent@disaster.gov" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%">Register securely</button>
        </form>
        <p class="text-center mt-3">
            Already registered? <a href="/">Log in here</a>
        </p>
    </div>
</div>
{% endblock %}
