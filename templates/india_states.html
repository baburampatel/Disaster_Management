{% extends 'base.html' %}
{% block title %}India States — DisasterGuard{% endblock %}
{% block content %}
<div class="mini-hero" style="background:linear-gradient(135deg,#e65100,#f57c00);"><h1>🇮🇳 India — Disaster Risk by State</h1><p style="color:rgba(255,255,255,.85);">Select your state to see relevant disaster information and risks.</p></div>
<div class="discover-grid">
{% for s in states %}
<a href="/india/{{ s }}" class="discover-card" id="state-{{ s|lower|replace(' ','-') }}-btn">
    <div class="icon">🏛️</div>
    <h3 style="font-size:.9rem;">{{ s }}</h3>
</a>
{% endfor %}
</div>
{% endblock %}
