{% extends "base.html" %}
{% block title %}States - DisasterGuard{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-4">
    <h2>Regional Threat Map (India)</h2>
    <a href="/user" class="btn btn-outline btn-sm">⬅ Dashboard</a>
</div>

<div class="discover-grid">
    {% for s in states %}
    <a href="/india/{{ s }}" class="discover-card" style="border-top: 4px solid var(--accent-color)">
        <div class="icon">📍</div>
        <h3>{{ s }}</h3>
        <p class="text-muted mt-2" style="font-size:0.875rem">View localized state scenarios</p>
    </a>
    {% endfor %}
</div>
{% endblock %}
