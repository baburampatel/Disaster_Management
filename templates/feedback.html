{% extends "base.html" %}
{% block title %}Feedback - DisasterGuard{% endblock %}
{% block content %}
<div class="flex justify-between items-center mb-4">
    <h2>Transmit Feedback to HQ</h2>
    <a href="/user" class="btn btn-outline btn-sm">⬅ Dashboard</a>
</div>

<div class="card auth-card mt-4 p-4">
    <form method="post">
        <div class="form-group">
            <label class="form-label">Message Log</label>
            <textarea name="message" rows="6" placeholder="Report issues, request features, or provide operational feedback..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Transmit Feedback</button>
    </form>
</div>
{% endblock %}
